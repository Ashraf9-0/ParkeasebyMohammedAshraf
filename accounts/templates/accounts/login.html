<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ParkEase — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'parking/style.css' %}">
</head>
<body>
    <div class="login-wrapper d-flex align-items-center justify-content-center vh-100">
        <div class="card login-card" style="max-width">
            <div class="card-body" style="padding: 5rem; ">
                
                <h2 class="fw-bold text-center mb-2" style="font-size: 2rem;">ParkEase</h2>
                <p class="text-muted text-center mb-4" style="font-size:15px;">
                    Sign in to your account
                </p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger py-2" style="font-size:14px;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fs-5">Username</label>
                        <input type="text" name="username" 
                               class="form-control form-control-lg" 
                               placeholder="Enter username" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fs-5">Password</label>
                        <input type="password" name="password" 
                               class="form-control form-control-lg" 
                               placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        Sign In
                    </button>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
