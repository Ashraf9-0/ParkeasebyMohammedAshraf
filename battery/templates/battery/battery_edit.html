{% extends 'parking/base.html' %}
{% load static %}
{% block title %}Edit Battery Transaction{% endblock %}
{% block page_heading %}Edit Battery Transaction{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0 fw-bold">Edit Transaction — {{ transaction.plate }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Driver Name</label>
                            <input type="text" name="driver_name" class="form-control"
                                   value="{{ transaction.driver_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Number Plate</label>
                            <input type="text" name="plate" class="form-control"
                                   value="{{ transaction.plate }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Battery</label>
                        <select name="battery_id" class="form-select" required>
                            {% for battery in batteries %}
                                <option value="{{ battery.id }}"
                                    {% if battery.id == transaction.battery.id %}selected{% endif %}>
                                    {{ battery.name }}
                                    {% if battery.battery_type == 'hire' %}
                                        — UGX {{ battery.daily_rate }}/day (Hire)
                                    {% else %}
                                        — UGX {{ battery.price }} (Sale)
                                    {% endif %}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date &amp; Time Taken</label>
                        <input type="datetime-local" name="date_taken" class="form-control"
                               value="{{ default_datetime }}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                        <a href="{% url 'battery_list' %}" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
