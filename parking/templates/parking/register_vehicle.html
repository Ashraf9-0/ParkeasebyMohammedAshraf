{% extends 'parking/base.html' %}
{% load static %}
{% block title %}Register Vehicle{% endblock %}
{% block page_heading %}Register Vehicle{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0 fw-bold">Register New Vehicle</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Driver Name</label>
                            <input type="text" name="driver_name" class="form-control" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phone" class="form-control" placeholder="e.g. 0701234567"
                                pattern="\d{10}" maxlength="10" minlength="10" title="Phone number must be exactly 10 digits" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Number Plate</label>
                            <input type="text" name="plate" class="form-control" placeholder="e.g. UAX123" required>
                        </div>
                        {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
{% endif %}
                        <div class="col-md-6">
                            <label class="form-label">Vehicle Type</label>
                            <select name="vehicle_type" class="form-select" required id="vehicleType">
                                <option value="" disabled selected>Select type...</option>
                                <option value="truck">Truck</option>
                                <option value="personal_car">Personal Car</option>
                                <option value="taxi">Taxi</option>
                                <option value="coaster">Coaster</option>
                                <option value="boda_boda">Boda-boda</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Vehicle Model</label>
                            <input type="text" name="model" class="form-control" placeholder="e.g. Toyota Corolla">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Vehicle Color</label>
                            <input type="text" name="color" class="form-control" placeholder="e.g. White">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Check-in Date</label>
                            <input type="date" name="arrival_date" value="{{default_date }}" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Check-in Time</label>
                            <input type="time" name="arrival_time" value="{{ default_time }}" class="form-control">
                        </div>
                    </div>

                    <div id="ninField" class="mb-3" style="display:none;">
                        <label class="form-label">NIN Number <span class="text-muted">(Boda-boda only)</span></label>
                        <input type="text" name="nin" class="form-control" placeholder="e.g. CM9300012345ABCD">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-2">Register Vehicle</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('vehicleType').addEventListener('change', function() {
        const ninField = document.getElementById('ninField');
        ninField.style.display = this.value === 'boda_boda' ? 'block' : 'none';
    });
</script>

{% endblock %}
