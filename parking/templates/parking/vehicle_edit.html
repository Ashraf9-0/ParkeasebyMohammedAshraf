{% extends 'parking/base.html' %}
{% load static %}
{% block title %}Edit Vehicle{% endblock %}
{% block page_heading %}Edit Vehicle{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0 fw-bold">Edit Vehicle — {{ vehicle.plate }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Driver Name</label>
                            <input type="text" name="driver_name" class="form-control"
                                   value="{{ vehicle.driver_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phone" class="form-control"
                                   value="{{ vehicle.phone }}"
                                   pattern="\d{10}" maxlength="10" minlength="10"
                                   title="Phone number must be exactly 10 digits" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Number Plate</label>
                            <input type="text" name="plate" class="form-control"
                                   value="{{ vehicle.plate }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Vehicle Type</label>
                            <select name="vehicle_type" class="form-select" id="vehicleType" required>
                                <option value="truck"        {% if vehicle.vehicle_type == 'truck'        %}selected{% endif %}>Truck</option>
                                <option value="personal_car" {% if vehicle.vehicle_type == 'personal_car' %}selected{% endif %}>Personal Car</option>
                                <option value="taxi"         {% if vehicle.vehicle_type == 'taxi'         %}selected{% endif %}>Taxi</option>
                                <option value="coaster"      {% if vehicle.vehicle_type == 'coaster'      %}selected{% endif %}>Coaster</option>
                                <option value="boda_boda"    {% if vehicle.vehicle_type == 'boda_boda'    %}selected{% endif %}>Boda-boda</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Vehicle Model</label>
                            <input type="text" name="model" class="form-control" value="{{ vehicle.model }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Vehicle Color</label>
                            <input type="text" name="color" class="form-control" value="{{ vehicle.color }}">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Check-in Date</label>
                            <input type="date" name="arrival_date" class="form-control"
                                   value="{{ vehicle.arrival_time|date:'Y-m-d' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Check-in Time</label>
                            <input type="time" name="arrival_time" class="form-control"
                                   value="{{ vehicle.arrival_time|date:'H:i' }}" required>
                        </div>
                    </div>

                    <div id="ninField" class="mb-3"
                         style="display:{% if vehicle.vehicle_type == 'boda_boda' %}block{% else %}none{% endif %};">
                        <label class="form-label">NIN Number <span class="text-muted">(Boda-boda only)</span></label>
                        <input type="text" name="nin" class="form-control" value="{{ vehicle.nin }}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                        <a href="{% url 'vehicle_detail' vehicle.pk %}" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('vehicleType').addEventListener('change', function () {
        document.getElementById('ninField').style.display =
            this.value === 'boda_boda' ? 'block' : 'none';
    });
</script>
{% endblock %}
